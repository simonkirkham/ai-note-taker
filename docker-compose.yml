services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]

  # Runs once on first start to create the two tables. Idempotent — safe to re-run.
  dynamodb-init:
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      - dynamodb-local
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 > /dev/null 2>&1;
      do sleep 1; done &&
      aws dynamodb create-table --endpoint-url http://dynamodb-local:8000
        --table-name notetaker-events
        --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S
        --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE
        --billing-mode PAY_PER_REQUEST 2>/dev/null || true &&
      aws dynamodb create-table --endpoint-url http://dynamodb-local:8000
        --table-name notetaker-proj-notetitlelist
        --attribute-definitions AttributeName=PK,AttributeType=S
        --key-schema AttributeName=PK,KeyType=HASH
        --billing-mode PAY_PER_REQUEST 2>/dev/null || true

volumes:
  dynamodb-data:
