name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Publish Lambda
        run: dotnet publish src/Api/Api.csproj -c Release -o src/Api/bin/Release/net8.0/publish

      - name: Deploy
        run: cdk deploy --require-approval never --outputs-file outputs.json

      - name: Extract API URL
        id: api-url
        run: |
          cat outputs.json
          echo "url=$(jq -r '.NoteTakerStack.ApiUrl' outputs.json)" >> $GITHUB_OUTPUT

      - name: Acceptance specs
        run: dotnet test tests/Specs/Specs.csproj
        env:
          API_BASE_URL: ${{ steps.api-url.outputs.url }}
